version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: medlog_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - medlog_network

  db:
    image: supabase/postgres:15.1.0.147
    container_name: medlog_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medlog2024}
      POSTGRES_DB: medlog
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/init_auth.sql:/docker-entrypoint-initdb.d/00-init_auth.sql
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - medlog_network

  kong:
    image: kong:3.4
    container_name: medlog_kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./supabase/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - medlog_network

  storage:
    image: minio/minio:latest
    container_name: medlog_storage
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-medlog}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-medlog2024}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - storage_data:/data
    command: server /data --console-address ":9001"
    networks:
      - medlog_network

  auth:
    image: supabase/gotrue:v2.143.0
    container_name: medlog_auth
    restart: unless-stopped
    depends_on:
      - db
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-medlog2024}@db:5432/medlog?search_path=auth
      GOTRUE_API_EXTERNAL_URL: http://localhost:8000/auth/v1
      API_EXTERNAL_URL: http://localhost:8000/auth/v1
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_OPERATOR_TOKEN: operator-token
      GOTRUE_JWT_SECRET: M4wWk76CU732AXT6wXq5TLtyglm8Ez8j/aXYTf4XhJE=
      JWT_SECRET: M4wWk76CU732AXT6wXq5TLtyglm8Ez8j/aXYTf4XhJE=
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_ALGORITHM: HS256
      GOTRUE_DB_MAX_POOL_SIZE: 20
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_LOG_LEVEL: debug
      GOTRUE_JWT_DEFAULT_GROUP_NAME: anon
    networks:
      - medlog_network

  rest:
    image: postgrest/postgrest:v11.2.2
    container_name: medlog_rest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGRST_DB_URI: postgresql://postgres:${DB_PASSWORD:-medlog2024}@db:5432/medlog
      PGRST_DB_SCHEMAS: public,auth
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: M4wWk76CU732AXT6wXq5TLtyglm8Ez8j/aXYTf4XhJE=
      PGRST_DB_USE_STATS: "false"
    networks:
      - medlog_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzcxOTc1MDcwLCJleHAiOjE4MDM1MTEwNzB9.6ODS08hcNrTr4Z8hsFvWfSm7NV8_DbB6W6qZ7m30QP4
    container_name: medlog_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: http://kong:8000
      SUPABASE_URL: http://kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzcxOTc1MDcwLCJleHAiOjE4MDM1MTEwNzB9.6ODS08hcNrTr4Z8hsFvWfSm7NV8_DbB6W6qZ7m30QP4
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3NzE5NzUwNzAsImV4cCI6MTgwMzUxMTA3MH0.gAUUJDyv1RxGUj1twuTJqnufslZVUVmmLgQbMbUaR00
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-medlog2024}@db:5432/medlog
      DB_PASSWORD: ${DB_PASSWORD:-medlog2024}
      MINIO_ENDPOINT: storage
      MINIO_PORT: 9000
      MINIO_USER: ${MINIO_USER:-medlog}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-medlog2024}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      - db
      - auth
      - rest
    networks:
      - medlog_network
    extra_hosts:
      - "localhost:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

networks:
  medlog_network:
    driver: bridge

volumes:
  db_data:
  storage_data:
