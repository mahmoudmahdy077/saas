name: MedLog CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install dependencies
        run: cd web && npm ci
      
      - name: Type check
        run: cd web && npx tsc --noEmit
      
      - name: Lint
        run: cd web && npm run lint
      
      - name: Build
        run: cd web && npm run build
      
      - name: Security audit
        run: cd web && npm audit --audit-level=high

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: echo "Deploy to your hosting platform (Vercel, Railway, etc.)"
        # Add your deployment step here:
        # - Vercel: uses: amondnet/vercel-action@v20
        # - Railway: uses: railwayapp/railway-action@v1
        # - Custom: Add SSH deployment script
